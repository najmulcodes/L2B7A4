name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gearup
          POSTGRES_PASSWORD: gearup
          POSTGRES_DB: gearup_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://gearup:gearup@localhost:5432/gearup_ci
      DIRECT_URL: postgresql://gearup:gearup@localhost:5432/gearup_ci
      JWT_ACCESS_SECRET: ci-access-secret-0123456789abcdef0123456789abcdef
      JWT_REFRESH_SECRET: ci-refresh-secret-0123456789abcdef0123456789abcdef
      APP_BASE_URL: http://localhost:5000
      SSLCOMMERZ_STORE_ID: ci-store
      SSLCOMMERZ_STORE_PASSWORD: ci-password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations to the CI database
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Seed smoke check
        run: npm run prisma:seed
